name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew :cropper:assembleRelease

      - name: Prepare Signing Key
        run: |
          # If the secret is Base64 encoded, decode it; otherwise, write it as is.
          if [[ "${{ secrets.SIGNING_PRIVATE_KEY }}" == -----BEGIN* ]]; then
            echo "${{ secrets.SIGNING_PRIVATE_KEY }}" > gpg_key.asc
          else
            echo "${{ secrets.SIGNING_PRIVATE_KEY }}" | base64 -d > gpg_key.asc
          fi
          
          # Convert ASCII armor to binary keyring format for Gradle
          gpg --batch --import gpg_key.asc
          gpg --batch --export-secret-keys F154B26F > secring.gpg

      - name: Publish to Maven Central
        run: |
          ./gradlew publishAllPublicationsToMavenCentralRepository \
            -PmavenCentralUsername="${{ secrets.SONATYPE_NEXUS_USERNAME }}" \
            -PmavenCentralPassword="${{ secrets.SONATYPE_NEXUS_PASSWORD }}" \
            -Psigning.keyId="F154B26F" \
            -Psigning.password="${{ secrets.SIGNING_PASSWORD }}" \
            -Psigning.secretKeyRingFile="$(pwd)/secring.gpg"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cropper/build/outputs/aar/*.aar
            cropper/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
